<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Detector UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="project-header">
        <h1 class="project-title">AI-Assisted Face Detector</h1>
        <p class="project-subtitle">Built for the Advanced Programming course at the University of Pisa</p>
    </header>

    <main class="camera-container">
        <video id="webcam" class="camera-video" autoplay playsinline></video>
        
        <canvas id="overlay" class="overlay-canvas"></canvas>
    </main>

    <footer class="controls">
        <button id="start-camera-btn" class="btn-primary">Start Camera</button>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
